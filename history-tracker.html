<script type="text/javascript">
    RED.nodes.registerType('history-tracker', {
        category: 'storage',
        color: '#3FADB5',
        defaults: {
            name: {value: ""},
            filepath: {value: "history.txt", required: true},
            valueField: {value: "payload"},
            outputMode: {value: "none"},
            unit: {value: "Liter"},
            chartFormat: {value: "dashboard2"},
            maxHourHistory: {value: 24, validate: RED.validators.number()},
            maxDayHistory: {value: 31, validate: RED.validators.number()},
            maxMonthHistory: {value: 24, validate: RED.validators.number()},
            maxYearHistory: {value: 10, validate: RED.validators.number()},
            yearlyGoal: {value: 0, validate: RED.validators.number()},
            goalStartMonth: {value: 1, validate: RED.validators.number()},
            goalEndMonth: {value: 12, validate: RED.validators.number()},
            maxFlowInterval: { value: 60 }
        },
        inputs: 1,
        outputs: 2,
        outputLabels: ["gauge (current month + goal as max)", "data output"],
        icon: "file.png",
        label: function() {
            return this.name || "history tracker";
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        paletteLabel: "history tracker"
    });
</script>

<script type="text/html" data-help-name="history-tracker">
    <p>Tracks counter values with automatic difference calculation and aggregates them by hour, day, month, and year.</p>
    
    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>File Path <span class="property-type">string</span></dt>
        <dd>Path to history file. Filename only = stored in userDir, full path = absolute path</dd>
        
        <dt>Value Field <span class="property-type">string</span></dt>
        <dd>Name of the field in msg to read the value from (default: payload)</dd>
        
        <dt>Unit <span class="property-type">string</span></dt>
        <dd>Unit of measurement (e.g. Liter, kWh, m³)</dd>
        
        <dt>Output Mode <span class="property-type">string</span></dt>
        <dd>Determines what data is sent as output</dd>
        
        <dt>Chart Format <span class="property-type">string</span></dt>
        <dd>Dashboard 2.0 format (flat array) or Dashboard 1.0 format (series/data/labels)</dd>
        
        <dt>History Limits <span class="property-type">number</span></dt>
        <dd>Maximum number of entries per history type (0 = unlimited). Oldest entries are automatically removed.</dd>
    </dl>

    <h3>How It Works</h3>
    <p>The node calculates the difference between consecutive values and sums them per time period.</p>
    <ul>
        <li>Negative differences are ignored (counter reset)</li>
        <li>When a period changes, the new period starts at 0</li>
        <li>The old period is moved to history</li>
        <li>History is limited to configured maximums (newest first)</li>
        <li>Missing periods are automatically filled with zero values</li>
    </ul>
    
    <h3>Dynamic Output Mode Control</h3>
    <p>The output mode can be changed at runtime via a message:</p>
    <pre>
msg.topic = "setOutputMode";
msg.payload = "month_history";  // or: none, last, current, all, hour_history, day_history, year_history
return msg;
    </pre>
    <p>This allows using the same History Tracker node for different dashboards or views without sending data when not needed.</p>
    
    <h3>Chart Output Formats</h3>
    <h4>Dashboard 2.0 Format</h4>
    <p>Flat array of objects for modern Dashboard 2.0 charts:</p>
    <pre>
[
  { label: 'actual', time: '2024-01', val: 150 },
  { label: 'goal', time: '2024-01', val: 120 },
  ...
]
    </pre>
    <p><b>Chart Configuration:</b> Key for series: <code>label</code>, Key for x-axis: <code>time</code>, Key for y-axis: <code>val</code></p>
    
    <h4>Dashboard 1.0 Format (Legacy)</h4>
    <p>Traditional format for old Dashboard charts:</p>
    <pre>
[{
  series: ['actual', 'goal'],
  data: [[150, 130, ...], [120, 120, ...]],
  labels: ['2024-01', '2024-02', ...]
}]
    </pre>
    
    <h3>Min/Max Tracking</h3>
    <p>When a period changes, minimum and maximum values are automatically calculated from sub-periods:</p>
    <ul>
        <li><b>Day → History:</b> Min/Max from hourly values of the day</li>
        <li><b>Month → History:</b> Min/Max from daily values of the month</li>
        <li><b>Year → History:</b> Min/Max from monthly values of the year</li>
    </ul>
    <p><i>Note: Min/Max are only stored for completed periods in history, not for current periods.</i></p>
    
    <h3>Backwards Compatibility</h3>
    <p>The node is fully backwards compatible with older data files:</p>
    <ul>
        <li>Old files without Min/Max values are read correctly</li>
        <li>New Min/Max values are calculated from the next period change</li>
        <li>Old entries retain their original format</li>
        <li>Legacy German timestamp format (DD.MM.YYYY, HH:MM:SS) is supported</li>
    </ul>
    
    <h3>Yearly Goal / Limit</h3>
    <p>Define a yearly goal for monitored consumption:</p>
    <ul>
        <li><b>Yearly Goal:</b> Target value (e.g. 1000 Liter). 0 = disabled.</li>
        <li><b>Start/End Month:</b> Period for the goal (e.g. January to December)</li>
        <li>Goal is calculated over the defined period</li>
        <li>Works across year boundaries (e.g. October to March)</li>
        <li>Remaining goal is distributed evenly across remaining days/months</li>
        <li>Consumption is calculated from month-level data only</li>
    </ul>
    
    <h3>Gap Filling</h3>
    <p>If the node detects missing periods (e.g. Node-RED was offline), it automatically fills gaps with zero values:</p>
    <ul>
        <li>Missing hours, days, months, or years are detected</li>
        <li>Gaps are filled with entries having value 0</li>
        <li>Timestamps are calculated for missing periods</li>
        <li>History remains continuous without data loss</li>
    </ul>
</script>
